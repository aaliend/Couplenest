<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Two soft shapes leaning toward each other">
  <!-- Sample placeholder illustration — replace per article. Brand palette, 16:9 landscape. -->
  <rect width="1200" height="675" fill="#FBF3E9"/>
  <!-- soft ground shadow -->
  <ellipse cx="600" cy="560" rx="430" ry="48" fill="#F5EDE2"/>
  <!-- blue shape, leaning right -->
  <g transform="rotate(8 450 420)">
    <rect x="350" y="250" width="190" height="320" rx="95" fill="#85C5D2" opacity="0.9"/>
  </g>
  <!-- orange shape, leaning left -->
  <g transform="rotate(-8 760 420)">
    <rect x="670" y="235" width="190" height="335" rx="95" fill="#EE8A3C" opacity="0.92"/>
  </g>
  <!-- thread connecting them -->
  <path d="M 545 330 C 600 285, 615 285, 662 322" fill="none" stroke="#1F1B16" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
  <!-- tiny heart at the middle of the thread -->
  <g transform="translate(592 276) scale(1.1)">
    <path d="M10 18 C 4 13, 0 9, 0 5.5 C 0 2.5, 2.4 0, 5.2 0 C 7.2 0, 9 1.2, 10 3 C 11 1.2, 12.8 0, 14.8 0 C 17.6 0, 20 2.5, 20 5.5 C 20 9, 16 13, 10 18 Z" fill="#F06B5A"/>
  </g>
  <!-- small sun -->
  <circle cx="1030" cy="130" r="48" fill="#F3C24C" opacity="0.85"/>
  <!-- sprout -->
  <g stroke="#6B5E52" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M170 558 C 170 522, 170 504, 178 482"/>
    <path d="M178 496 C 158 486, 150 472, 152 456 C 170 458, 182 470, 182 488"/>
    <path d="M178 504 C 198 496, 206 482, 206 466 C 188 466, 178 478, 176 492"/>
  </g>
</svg>
